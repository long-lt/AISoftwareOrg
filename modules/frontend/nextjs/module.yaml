id: frontend.nextjs
name: Next.js Frontend Module
type: frontend

supported_project_types:
  - web_app
  - admin_dashboard
  - fullstack_saas

required_inputs:
  - docs/product_spec.json
  - docs/design.md
  - docs/api_contract.md

produced_outputs:
  - source/frontend/package.json
  - source/frontend/app/
  - source/frontend/components/
  - source/frontend/lib/

quality_commands:
  - npm install
  - npm run lint
  - npm run build
  - npm test

dependencies: []

default_template: nextjs_saas
