openapi: 3.0.3
info:
  title: Test API
  version: 0.1.0
paths:
  /health:
    get:
      tags: [system]
      summary: Health check
      responses:
        "200":
          description: API is healthy
  /api/todo:
    get:
      tags: [todo]
      summary: List todo items
      responses:
        "200":
          description: List of todo items
    post:
      tags: [todo]
      summary: Create todo item
      responses:
        "200":
          description: Created todo item
  /api/dashboard:
    get:
      tags: [dashboard]
      summary: List dashboard items
      responses:
        "200":
          description: List of dashboard items
    post:
      tags: [dashboard]
      summary: Create dashboard item
      responses:
        "200":
          description: Created dashboard item
  /api/settings:
    get:
      tags: [settings]
      summary: List settings items
      responses:
        "200":
          description: List of settings items
    post:
      tags: [settings]
      summary: Create settings item
      responses:
        "200":
          description: Created settings item
