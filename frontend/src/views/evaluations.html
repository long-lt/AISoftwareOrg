<div class="stat-row" style="display:flex; justify-content:space-between; margin-bottom:24px; background:var(--bg-card); padding:20px; border-radius:var(--radius); border:1px solid var(--border-color); flex-wrap:wrap; gap:16px;">
  <div class="stat"><span class="stat-value" id="evals-kpi-today">0</span><div class="stat-label">Evaluations Today</div></div>
  <div class="stat"><span class="stat-value" id="evals-kpi-pass-rate" style="color:var(--accent-green)">0.0%</span><div class="stat-label">Pass Rate</div></div>
  <div class="stat"><span class="stat-value" id="evals-kpi-failed" style="color:var(--accent-rose)">0</span><div class="stat-label">Failed Checks</div></div>
  <div class="stat"><span class="stat-value" id="evals-kpi-regressions" style="color:var(--accent-amber)">0</span><div class="stat-label">Regressions</div></div>
  <div class="stat"><span class="stat-value" id="evals-kpi-avg">0.0%</span><div class="stat-label">Avg Score</div></div>
</div>

<div class="card-panel">
  <h2>🔬 AI Safety, Correctness & Drift Benchmark Runs</h2>
  <table style="margin-top:15px;">
    <thead>
      <tr><th>Evaluation Run</th><th>Target</th><th>Type</th><th>Dataset Size</th><th>Score</th><th>Result</th></tr>
    </thead>
    <tbody id="evals-table-body">
      <tr>
        <td colspan="6" style="text-align:center; color:var(--text-muted); padding:20px;">Đang tải kết quả kiểm định & benchmarks...</td>
      </tr>
    </tbody>
  </table>
</div>
