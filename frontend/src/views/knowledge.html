<div class="stat-row" style="display:flex; justify-content:space-between; margin-bottom:24px; background:var(--bg-card); padding:20px; border-radius:var(--radius); border:1px solid var(--border-color); flex-wrap:wrap; gap:16px;">
  <div class="stat"><span class="stat-value" id="knowledge-kpi-docs">0</span><div class="stat-label">Indexed Documents</div></div>
  <div class="stat"><span class="stat-value" id="knowledge-kpi-bases">0</span><div class="stat-label">Knowledge Bases</div></div>
  <div class="stat"><span class="stat-value" id="knowledge-kpi-chunks">0</span><div class="stat-label">Vectored Chunks</div></div>
  <div class="stat"><span class="stat-value" id="knowledge-kpi-queries">0</span><div class="stat-label">Queries Today</div></div>
  <div class="stat"><span class="stat-value" id="knowledge-kpi-outdated" style="color:var(--accent-amber)">0</span><div class="stat-label">Outdated Docs</div></div>
</div>

<div class="card-panel">
  <h2>🔍 Semantic Search Vector Database</h2>
  <input type="text" placeholder="Ask anything about your software factory codebase, specifications and design decisions..."
         style="width: 100%; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border-color);
                border-radius: 6px; color: var(--text-primary); font-size: 14px; outline: none; margin: 15px 0;">
  
  <div class="grid-thirds" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:16px;">
    <div class="card-panel" style="background:rgba(255,255,255,0.02)">
      <h3>Product Specs</h3>
      <p style="font-size:12px; color:var(--text-muted); margin-top:4px;">PRDs, screen list config, theme specs.</p>
    </div>
    <div class="card-panel" style="background:rgba(255,255,255,0.02)">
      <h3>Coding Standards</h3>
      <p style="font-size:12px; color:var(--text-muted); margin-top:4px;">Flutter lint rules, Dart styling guides.</p>
    </div>
    <div class="card-panel" style="background:rgba(255,255,255,0.02)">
      <h3>Prompt Library</h3>
      <p style="font-size:12px; color:var(--text-muted); margin-top:4px;">LLM templates for dev, BA and QA agents.</p>
    </div>
  </div>
</div>
