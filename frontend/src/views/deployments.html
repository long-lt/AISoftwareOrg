<div class="stat-row" style="display:flex; justify-content:space-between; margin-bottom:24px; background:var(--bg-card); padding:20px; border-radius:var(--radius); border:1px solid var(--border-color); flex-wrap:wrap; gap:16px;">
  <div class="stat"><span class="stat-value" id="deploy-kpi-today">0</span><div class="stat-label">Deployments Today</div></div>
  <div class="stat"><span class="stat-value" id="deploy-kpi-prod">0</span><div class="stat-label">Production Services</div></div>
  <div class="stat"><span class="stat-value" id="deploy-kpi-rollbacks" style="color:var(--accent-amber)">0</span><div class="stat-label">Rollbacks</div></div>
  <div class="stat"><span class="stat-value" id="deploy-kpi-failed" style="color:var(--accent-rose)">0</span><div class="stat-label">Failed Deployments</div></div>
  <div class="stat"><span class="stat-value" id="deploy-kpi-success-rate" style="color:var(--accent-green)">0.0%</span><div class="stat-label">Success Rate</div></div>
</div>

<div class="card-panel">
  <h2>🚀 Live Service Releases</h2>
  <table style="margin-top:15px;">
    <thead>
      <tr><th>Service</th><th>Project</th><th>Environment</th><th>Version</th><th>Region</th><th>Status</th></tr>
    </thead>
    <tbody id="deployments-table-body">
      <tr>
        <td colspan="6" style="text-align:center; color:var(--text-muted); padding:20px;">Đang tải danh sách dịch vụ live...</td>
      </tr>
    </tbody>
  </table>
</div>
